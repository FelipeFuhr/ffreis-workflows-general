name: General / shellcheck

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory to scan for shell scripts
        required: false
        type: string
        default: .
      files:
        description: Optional newline-separated list of files to check (relative to working-directory)
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Run shellcheck
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
          FILES_INPUT: ${{ inputs.files }}
        run: |
          set -euo pipefail
          cd "$WORKING_DIRECTORY"

          files=()
          if [[ -n "$FILES_INPUT" ]]; then
            while IFS= read -r line; do
              [[ -z "$line" ]] && continue
              files+=("$line")
            done <<< "$FILES_INPUT"
          else
            while IFS= read -r -d '' f; do
              files+=("${f#./}")
            done < <(find . -type f -name '*.sh' -print0)
          fi

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No shell scripts found; skipping."
            exit 0
          fi

          shellcheck -x "${files[@]}"
