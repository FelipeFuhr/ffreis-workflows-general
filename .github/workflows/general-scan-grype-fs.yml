name: General / Grype Filesystem Scan

on:
  workflow_call:
    inputs:
      path:
        description: "Directory to scan"
        type: string
        default: "."
      upload-sarif:
        description: "Upload SARIF to GitHub code scanning"
        type: boolean
        default: true

permissions:
  contents: read
  security-events: write

jobs:
  grype:
    name: Grype (fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: scan
        name: Run Grype (filesystem)
        uses: anchore/scan-action@869c549e657a088dc0441b08ce4fc0ecdac2bb65 # v5
        with:
          path: ${{ inputs.path }}
          output-format: sarif
          output-file: grype.sarif

      - name: Validate SARIF output
        shell: bash
        run: |
          set -euo pipefail
          test -s grype.sarif || (echo "grype.sarif was not generated or is empty" >&2 && exit 1)

      - name: Upload SARIF
        if: inputs.upload-sarif && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f
        with:
          sarif_file: grype.sarif
          category: grype-fs

