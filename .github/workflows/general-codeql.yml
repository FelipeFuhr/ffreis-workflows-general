name: General / CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: Comma-separated CodeQL languages (e.g. "go,python" or "javascript")
        required: true
        type: string
      source-root:
        description: Source root to analyze
        required: false
        type: string
        default: .
      build-command:
        description: Optional build command. If empty, uses CodeQL autobuild.
        required: false
        type: string
        default: ""
      query-suite:
        description: Optional CodeQL query suite (e.g. security-extended)
        required: false
        type: string
        default: ""
      upload-sarif:
        description: Upload SARIF to GitHub code scanning
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Resolve CodeQL settings
        id: vars
        env:
          LANGUAGES: ${{ inputs.languages }}
          SOURCE_ROOT: ${{ inputs.source-root }}
          QUERY_SUITE: ${{ inputs.query-suite }}
        run: |
          set -euo pipefail

          resolved_source_root="$SOURCE_ROOT"
          resolved_languages="$(echo "$LANGUAGES" | tr -d ' ')"

          # For `language: actions`, CodeQL expects to find workflows under `.github/workflows/`
          # relative to the repo root. Using `source-root: .github/workflows` can result in
          # "no source code seen during build" because the extractor no longer sees the
          # standard workflow path.
          if [[ "$resolved_languages" == "actions" ]]; then
            resolved_source_root="."
          fi

          {
            echo "languages=$resolved_languages"
            echo "source_root=$resolved_source_root"
            echo "query_suite=$QUERY_SUITE"
          } >> "$GITHUB_OUTPUT"

      - name: CodeQL init (default queries)
        if: inputs.query-suite == ''
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f
        with:
          languages: ${{ steps.vars.outputs.languages }}
          source-root: ${{ steps.vars.outputs.source_root }}

      - name: CodeQL init (custom queries)
        if: inputs.query-suite != ''
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f
        with:
          languages: ${{ steps.vars.outputs.languages }}
          source-root: ${{ steps.vars.outputs.source_root }}
          queries: ${{ steps.vars.outputs.query_suite }}

      - name: Autobuild
        if: inputs.build-command == '' && steps.vars.outputs.languages != 'actions'
        uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f

      - name: Build (manual)
        if: inputs.build-command != ''
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          set -euo pipefail
          bash -lc "$BUILD_COMMAND"

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f
        with:
          category: "/language:${{ steps.vars.outputs.languages }}"
          upload: ${{ inputs.upload-sarif && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
