name: DevOps / PR Hygiene

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semantic-pr:
    permissions:
      contents: read
    uses: ./.github/workflows/general-semantic-pr.yml
    with:
      require-scope: false

  actionlint:
    permissions:
      contents: read
    uses: ./.github/workflows/general-actionlint.yml
    with:
      working-directory: "."
