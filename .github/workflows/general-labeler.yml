name: General / Labeler

on:
  workflow_call:
    inputs:
      rules-json:
        description: "JSON array of {label: string, patterns: string[]} objects"
        required: true
        type: string
      changed-files:
        description: Optional newline-separated list of changed files (bypasses GitHub API)
        required: false
        type: string
        default: ""
      pr-number:
        description: Optional PR number (only needed if not running on pull_request)
        required: false
        type: number
        default: 0
      dry-run:
        description: If true, prints labels without applying them
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels
        env:
          RULES_JSON: ${{ inputs.rules-json }}
          CHANGED_FILES: ${{ inputs.changed-files }}
          PR_NUMBER: ${{ inputs.pr-number }}
          DRY_RUN: ${{ inputs.dry-run }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_API_URL: ${{ github.api_url }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import hashlib
          import os
          import sys
          import urllib.request
          import urllib.error
          from fnmatch import fnmatch
          from typing import Iterable
          
          rules_json = os.environ["RULES_JSON"]
          changed_files_raw = os.environ.get("CHANGED_FILES", "")
          dry_run = os.environ.get("DRY_RUN", "false").lower() == "true"
          
          gh_token = os.environ["GH_TOKEN"]
          gh_repo = os.environ["GH_REPO"]
          gh_api = os.environ["GH_API_URL"].rstrip("/")
          
          pr_number = int(os.environ.get("PR_NUMBER", "0") or "0")
          event_pr = os.environ.get("EVENT_PR_NUMBER", "")
          if pr_number == 0 and event_pr:
              pr_number = int(event_pr)
          
          try:
              rules = json.loads(rules_json)
          except Exception as e:
              print(f"ERROR: invalid rules-json: {e}", file=sys.stderr)
              sys.exit(2)
          
          if not isinstance(rules, list) or not rules:
              print("ERROR: rules-json must be a non-empty JSON array", file=sys.stderr)
              sys.exit(2)
          
          def api_request(method: str, path: str, payload_obj=None):
              url = f"{gh_api}{path}"
              data = None
              headers = {
                  "Authorization": f"Bearer {gh_token}",
                  "Accept": "application/vnd.github+json",
              }
              if payload_obj is not None:
                  data = json.dumps(payload_obj).encode("utf-8")
                  headers["Content-Type"] = "application/json"

              req = urllib.request.Request(url, method=method, data=data, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      raw = resp.read()
                      if not raw:
                          return resp.status, None
                      try:
                          return resp.status, json.loads(raw.decode("utf-8"))
                      except Exception:
                          return resp.status, raw.decode("utf-8", errors="ignore")
              except urllib.error.HTTPError as e:
                  body = ""
                  try:
                      body = e.read().decode("utf-8", errors="ignore")
                  except Exception:
                      body = ""
                  print(f"GitHub API error: {method} {path} -> HTTP {e.code}", file=sys.stderr)
                  if body:
                      print(body, file=sys.stderr)
                  raise

          def api_get_json(path: str):
              _, out = api_request("GET", path)
              return out

          def list_pr_files(repo: str, number: int) -> list[str]:
              files: list[str] = []
              page = 1
              while True:
                  data = api_get_json(f"/repos/{repo}/pulls/{number}/files?per_page=100&page={page}")
                  if not data:
                      break
                  files.extend([item["filename"] for item in data if "filename" in item])
                  if len(data) < 100:
                      break
                  page += 1
              return files

          def list_repo_labels(repo: str) -> set[str]:
              out: set[str] = set()
              page = 1
              while True:
                  data = api_get_json(f"/repos/{repo}/labels?per_page=100&page={page}")
                  if not data:
                      break
                  for item in data:
                      name = item.get("name")
                      if isinstance(name, str):
                          out.add(name)
                  if len(data) < 100:
                      break
                  page += 1
              return out

          def label_color(label: str) -> str:
              # Deterministic "random" color; must be 6 hex chars.
              return hashlib.sha256(label.encode("utf-8")).hexdigest()[:6]

          def ensure_labels_exist(repo: str, labels_to_ensure: Iterable[str]) -> None:
              existing = list_repo_labels(repo)
              missing = [l for l in labels_to_ensure if l not in existing]
              if not missing:
                  return
              print(f"Creating missing labels: {', '.join(missing)}")
              for l in missing:
                  try:
                      api_request("POST", f"/repos/{repo}/labels", {"name": l, "color": label_color(l)})
                  except urllib.error.HTTPError as e:
                      code = getattr(e, "code", None)
                      # If created concurrently or already exists, ignore.
                      if code in (409,):
                          continue
                      # GitHub sometimes uses 422 for "already exists"; if so, ignore.
                      if code == 422:
                          try:
                              existing_now = list_repo_labels(repo)
                              if l in existing_now:
                                  continue
                          except Exception:
                              pass
                          raise
                      raise
          
          if changed_files_raw.strip():
              changed_files = [line.strip() for line in changed_files_raw.splitlines() if line.strip()]
          else:
              if pr_number <= 0:
                  print("ERROR: could not determine PR number; provide inputs.pr-number or run on pull_request", file=sys.stderr)
                  sys.exit(2)
              changed_files = list_pr_files(gh_repo, pr_number)
          
          print(f"Changed files ({len(changed_files)}):")
          for f in changed_files:
              print(f"- {f}")
          
          labels: set[str] = set()
          for item in rules:
              if not isinstance(item, dict):
                  continue
              label = item.get("label")
              patterns = item.get("patterns", [])
              if not label or not isinstance(label, str):
                  continue
              if not isinstance(patterns, list) or not patterns:
                  continue
              for f in changed_files:
                  # Use fnmatch: supports *, ?, [] and is sufficient for most glob patterns.
                  if any(isinstance(p, str) and fnmatch(f, p) for p in patterns):
                      labels.add(label)
                      break
          
          if not labels:
              print("No labels matched; nothing to do.")
              sys.exit(0)
          
          labels_sorted = sorted(labels)
          print(f"Matched labels: {', '.join(labels_sorted)}")
          
          if dry_run:
              print("Dry-run enabled; skipping label application.")
              sys.exit(0)
          
          # Create missing labels, then apply with retry (labels can be eventually consistent).
          attempts = 5
          delay_s = 0.2
          last_err = None
          for attempt in range(1, attempts + 1):
              try:
                  ensure_labels_exist(gh_repo, labels_sorted)
                  api_request("POST", f"/repos/{gh_repo}/issues/{pr_number}/labels", {"labels": labels_sorted})
                  print("Labels applied.")
                  sys.exit(0)
              except urllib.error.HTTPError as e:
                  if getattr(e, "code", None) != 422:
                      raise
                  last_err = e
                  # Try to parse which labels were invalid, create them, and retry.
                  try:
                      body = e.read().decode("utf-8", errors="ignore")
                      data = json.loads(body) if body else {}
                      invalid = [
                          err.get("value")
                          for err in (data.get("errors") or [])
                          if err.get("resource") == "Label" and err.get("field") == "name" and err.get("code") == "invalid"
                      ]
                      invalid = [v for v in invalid if isinstance(v, str) and v]
                      if invalid:
                          print(f"Retry {attempt}/{attempts}: creating invalid/missing labels: {', '.join(invalid)}")
                          ensure_labels_exist(gh_repo, invalid)
                  except Exception:
                      pass
                  if attempt < attempts:
                      print(f"Retry {attempt}/{attempts}: label apply returned 422; sleeping {delay_s:.1f}s")
                      try:
                          import time
                          time.sleep(delay_s)
                      except Exception:
                          pass
                      delay_s *= 2
                      continue
                  raise

          if last_err is not None:
              raise last_err
          PY
