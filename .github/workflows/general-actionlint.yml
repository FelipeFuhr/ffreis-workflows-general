name: General / actionlint

on:
  workflow_call:
    inputs:
      working-directory:
        description: Root directory to scan (expects .github/workflows under it)
        required: false
        type: string
        default: .
      actionlint-version:
        description: actionlint version to install (without leading v)
        required: false
        type: string
        default: 1.7.7

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: ${{ inputs.actionlint-version }}
        run: |
          set -euo pipefail
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL "$url" -o "$tmp/actionlint.tgz"
          tar -xzf "$tmp/actionlint.tgz" -C "$tmp"
          sudo install -m 0755 "$tmp/actionlint" /usr/local/bin/actionlint
          actionlint -version

      - name: Run actionlint
        env:
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          set -euo pipefail
          cd "$WORKING_DIRECTORY"
          if [[ ! -d ".github/workflows" ]]; then
            echo "ERROR: expected .github/workflows under '$WORKING_DIRECTORY'"
            exit 1
          fi
          actionlint
